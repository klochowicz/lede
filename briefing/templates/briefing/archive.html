{% extends "briefing/base.html" %}
{% block content %}
  <h1>Archive</h1>
  <ul>{% for digest in digests %}
    <li><a href="{% url 'briefing:digest_detail' digest.pk %}">
      {{ digest.get_kind_display }} — {{ digest.period_end|date:"j M Y" }}</a></li>
  {% empty %}<li>Nothing archived yet.</li>{% endfor %}</ul>
{% endblock %}
